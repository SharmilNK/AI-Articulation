name: AI Articulation Daily Digest

on:
  schedule:
    # Runs at 07:00 UTC every day
    # Convert to your timezone: 07:00 UTC = 03:00 ET / 00:00 PT
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab (useful for testing)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Upload generated doc as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/*.docx
          retention-days: 7
